name: Deploy to Server
on:
  push:
      branches: [main]
      jobs:
        deploy:
            runs-on: ubuntu-latest
                steps:
                      - uses: actions/checkout@v3
                            - name: Deploy via SSH
                                    uses: appleboy/ssh-action@v1.0.0
                                            with:
                                                      host: ${{ secrets.SERVER_HOST }}
                                                                username: root
                                                                          key: ${{ secrets.SSH_PRIVATE_KEY }}
                                                                                    script: |
                                                                                                cd /root/watch-os-backend 2>/dev/null || git clone https://github.com/pulush/watch-os-backend /root/watch-os-backend
                                                                                                            git -C /root/watch-os-backend pull origin main
                                                                                                                        cp /root/watch-os-backend/index.html /var/www/watchos/index.html
                                                                                                                                    echo "Deploy done"
